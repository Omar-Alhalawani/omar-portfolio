<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">LumaLink optical emergency communication system</title>
  <desc id="desc">A Raspberry Pi camera receiving Morse-code light pulses and converting them into an emergency dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset="0.56" stop-color="#183950"/>
      <stop offset="1" stop-color="#264a3f"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6c453"/>
      <stop offset="1" stop-color="#68d8f6"/>
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="640" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#ffffff" stroke-width="2">
    <path d="M0 120H960"/>
    <path d="M0 260H960"/>
    <path d="M0 400H960"/>
    <path d="M0 540H960"/>
    <path d="M140 0V640"/>
    <path d="M320 0V640"/>
    <path d="M500 0V640"/>
    <path d="M680 0V640"/>
    <path d="M860 0V640"/>
  </g>
  <g transform="translate(92 146)">
    <rect x="0" y="0" width="274" height="348" rx="28" fill="#101827" stroke="#4c6378" stroke-width="5"/>
    <rect x="34" y="58" width="206" height="130" rx="18" fill="#182637" stroke="#5c7385" stroke-width="4"/>
    <circle cx="137" cy="123" r="48" fill="#0f1722" stroke="#7cc9df" stroke-width="10"/>
    <circle cx="137" cy="123" r="24" fill="#1a3343" stroke="#f6c453" stroke-width="7"/>
    <rect x="48" y="226" width="178" height="44" rx="11" fill="#223548"/>
    <circle cx="76" cy="248" r="9" fill="#62d26f"/>
    <circle cx="111" cy="248" r="9" fill="#f6c453"/>
    <circle cx="146" cy="248" r="9" fill="#68d8f6"/>
    <path d="M50 306H224" stroke="#5c7385" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g filter="url(#soft-glow)" fill="url(#pulse)">
    <rect x="414" y="294" width="66" height="22" rx="11"/>
    <rect x="512" y="294" width="22" height="22" rx="11"/>
    <rect x="568" y="294" width="90" height="22" rx="11"/>
    <rect x="692" y="294" width="22" height="22" rx="11"/>
    <rect x="748" y="294" width="66" height="22" rx="11"/>
  </g>
  <path d="M386 304C450 246 526 226 612 248C680 265 748 254 816 206" fill="none" stroke="#68d8f6" stroke-width="5" stroke-dasharray="12 18" opacity="0.75"/>
  <g transform="translate(620 116)">
    <rect x="0" y="0" width="246" height="286" rx="22" fill="#f4f7fb" stroke="#d7e3ef" stroke-width="5"/>
    <rect x="28" y="34" width="190" height="34" rx="8" fill="#dc3545"/>
    <rect x="28" y="96" width="156" height="14" rx="7" fill="#718196"/>
    <rect x="28" y="128" width="190" height="14" rx="7" fill="#a9b6c5"/>
    <rect x="28" y="160" width="128" height="14" rx="7" fill="#a9b6c5"/>
    <rect x="28" y="214" width="190" height="42" rx="12" fill="#16364c"/>
    <text x="123" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">SOS</text>
  </g>
  <g transform="translate(118 72)" fill="#ffffff" font-family="Arial, sans-serif">
